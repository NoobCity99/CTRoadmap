services:
  ctroadmap:
    image: ghcr.io/noobcity99/ctroadmap:beta
    container_name: ctroadmap-beta
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      # Persistent atlas data and generated exports live beside this compose file.
      - ./data:/app/data
      - ./exports:/app/exports
    restart: unless-stopped
